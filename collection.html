<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Still Point — The Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f3f1ea; --ink:#211e19; --soft:#6e675b; --faint:#a59e90; --line:#dfdacd;
    --disp:"Cormorant Garamond",Georgia,serif;
    --serif:"EB Garamond",Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--serif);-webkit-font-smoothing:antialiased}
  .layout{display:flex;align-items:flex-start}

  /* ---- the masthead in the margin ---- */
  aside{width:36%;max-width:432px;flex:none;position:sticky;top:0;height:100vh;
    border-right:1px solid var(--line);
    padding:clamp(40px,6vh,72px) clamp(30px,3.4vw,58px);
    display:flex;flex-direction:column;justify-content:space-between}
  .kick{font-family:var(--sans);font-size:11px;letter-spacing:.36em;text-transform:uppercase;color:var(--soft)}
  .mid{max-width:13em}
  h1{font-family:var(--disp);font-weight:600;font-size:clamp(56px,6.4vw,92px);line-height:.93;
     letter-spacing:.005em;margin:0 0 26px}
  .epi{font-style:italic;font-size:20px;line-height:1.5;color:#403b32;margin:0;max-width:15em}
  .epi .by{display:block;margin-top:12px;font-family:var(--sans);font-style:normal;
    font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--soft)}
  .bot .ln{height:1px;background:var(--line);margin-bottom:16px}
  .credits{font-family:var(--sans);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--soft);display:grid;grid-template-columns:auto 1fr;gap:7px 18px;align-items:baseline}
  .credits .lab{color:var(--faint)}
  .back{display:inline-block;margin-top:20px;font-family:var(--sans);font-size:10px;
    letter-spacing:.16em;text-transform:uppercase;color:var(--faint);text-decoration:none}
  .back:hover{color:var(--soft)}

  /* ---- the pictures ---- */
  .gallery{flex:1;padding:clamp(44px,6vh,76px) clamp(22px,3.6vw,60px) 96px;column-gap:38px}
  .item{break-inside:avoid;margin:0 0 40px}
  .imgwrap{position:relative;display:block;background:#fff;box-shadow:0 3px 18px rgba(0,0,0,.10);cursor:zoom-in}
  .imgwrap img{width:100%;display:block;-webkit-user-drag:none;user-select:none}
  .imgwrap::after{content:attr(data-artist);position:absolute;right:10px;bottom:8px;font-family:var(--sans);
    font-size:8.5px;font-weight:400;letter-spacing:.1em;color:var(--lc,#ddd8cf);pointer-events:none}
  .imgwrap[data-lbl="d"]::after{text-shadow:0 1px 1.5px rgba(0,0,0,.4)}
  .imgwrap[data-lbl="l"]::after{text-shadow:0 1px 1.5px rgba(255,255,255,.45)}
  figcaption{margin-top:12px;font-style:italic;font-size:18px;color:#383329;line-height:1.34;
    display:flex;gap:11px;align-items:baseline}
  figcaption .no{font-family:var(--sans);font-style:normal;font-size:10px;letter-spacing:.16em;
    color:var(--faint);flex:none;padding-top:3px}
  .foot{font-family:var(--sans);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--faint);text-align:center;padding:6px 24px 44px}

  @media(min-width:1480px){ .gallery{column-count:3} }
  @media(min-width:760px) and (max-width:1479px){ .gallery{column-count:2} }
  @media(max-width:759px){
    .layout{display:block}
    aside{width:auto;max-width:none;position:static;height:auto;min-height:auto;
      border-right:0;border-bottom:1px solid var(--line)}
    .gallery{column-count:1;padding:34px 22px 72px}
  }

  /* ---- enlarge ---- */
  #box{position:fixed;inset:0;background:#16140f;display:none;align-items:center;justify-content:center;
       flex-direction:column;gap:18px;padding:32px;z-index:40}
  #box.open{display:flex}
  #bf{position:relative;display:inline-block}
  #bf img{display:block;max-height:80vh;max-width:92vw;-webkit-user-drag:none;user-select:none}
  #bf::after{content:attr(data-artist);position:absolute;right:12px;bottom:10px;font-family:var(--sans);
    font-size:10.5px;font-weight:400;letter-spacing:.11em;color:var(--lc,#ddd8cf);pointer-events:none}
  #bf[data-lbl="d"]::after{text-shadow:0 1px 1.5px rgba(0,0,0,.4)}
  #bf[data-lbl="l"]::after{text-shadow:0 1px 1.5px rgba(255,255,255,.45)}
  #bcap{font-style:italic;font-size:22px;color:#ece8df;text-align:center}
  #bcap .no{font-family:var(--sans);font-style:normal;font-size:11px;letter-spacing:.2em;color:#8c867a;margin-right:10px}
  #x{position:fixed;top:15px;right:21px;font-size:30px;line-height:1;color:#b7b2a6;background:none;border:0;cursor:pointer;font-family:var(--sans)}
  #x:hover{color:#fff}
  .arw{position:fixed;top:50%;transform:translateY(-50%);font-size:42px;color:#857f73;background:none;border:0;cursor:pointer;padding:10px 18px}
  .arw:hover{color:#fff}.ap{left:8px}.an{right:8px}
</style>
</head>
<body>
  <div class="layout">
    <aside>
      <div class="mid">
        <div class="kick">A Collection</div>
        <h1>Still&nbsp;Point</h1>
        <p class="epi">&ldquo;At the still point of the turning world, there the dance is.&rdquo;
          <span class="by">T. S. Eliot &middot; Four Quartets</span></p>
      </div>
      <div class="bot">
        <div class="ln"></div>
        <div class="credits">
          <span class="lab">Artists</span><span>Opus 4.8 &amp; Fable 5.0</span>
          <span class="lab">Curator</span><span>Pundir</span>
          <span class="lab">Pictures</span><span id="count"></span>
        </div>
        <a class="back" href="index.html">&#8249;&nbsp; The story behind it</a>
      </div>
    </aside>

    <div class="gallery" id="gallery"></div>
  </div>

  <footer class="foot">High-resolution images available on request</footer>

  <div id="box" role="dialog" aria-modal="true">
    <button id="x" aria-label="Close">&times;</button>
    <button class="arw ap" id="bp" aria-label="Previous">&#8249;</button>
    <div id="bf"><img id="bimg" alt=""></div>
    <div id="bcap"></div>
    <button class="arw an" id="bn" aria-label="Next">&#8250;</button>
  </div>

  <script src="data.js"></script>
  <script>
    var G = window.GALLERY || [];
    function esc(s){return (s||'').replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    function n2(i){return (i<9?'0':'')+(i+1);}
    function label(a){return a==='Fable' ? 'Fable 5.0' : 'Opus 4.8';}
    document.getElementById('count').textContent = G.length;

    var gallery = document.getElementById('gallery');
    G.forEach(function(w, idx){
      var d = document.createElement('div'); d.className = 'item';
      d.innerHTML =
        '<a class="imgwrap" data-artist="'+esc(label(w.artist))+'" data-lbl="'+(w.lbl||'d')+'" style="--lc:'+(w.lc||'#ddd8cf')+'"><img loading="lazy" src="'+w.src+'" alt=""></a>'
      + '<figcaption><span class="no">'+n2(idx)+'</span><span>&ldquo;'+esc(w.title)+'&rdquo;</span></figcaption>';
      d.querySelector('.imgwrap').onclick = function(){ open(idx); };
      gallery.appendChild(d);
    });

    var box=document.getElementById('box'), bf=document.getElementById('bf'), bimg=document.getElementById('bimg'),
        bcap=document.getElementById('bcap'), cur=0, pre={};
    function preload(i){ [i-1,i+1].forEach(function(j){ j=(j+G.length)%G.length;
      if(!pre[j]){ var im=new Image(); im.src=G[j].src; pre[j]=im; } }); }
    function open(i){ cur=i; paint(); box.classList.add('open'); }
    function close(){ box.classList.remove('open'); bimg.src=''; }
    function paint(){ var w=G[cur]||{}; bimg.src=w.src; bimg.alt=w.title||'';
      bf.setAttribute('data-artist', label(w.artist)); bf.setAttribute('data-lbl', w.lbl||'d');
      bf.style.setProperty('--lc', w.lc||'#ddd8cf');
      bcap.innerHTML='<span class="no">'+n2(cur)+'</span>&ldquo;'+esc(w.title)+'&rdquo;'; preload(cur); }
    function step(d){ cur=(cur+d+G.length)%G.length; paint(); }
    document.getElementById('x').onclick = close;
    document.getElementById('bp').onclick = function(){ step(-1); };
    document.getElementById('bn').onclick = function(){ step(1); };
    box.addEventListener('click', function(e){ if(e.target===box) close(); });
    document.addEventListener('keydown', function(e){
      if(!box.classList.contains('open')) return;
      if(e.key==='Escape') close(); else if(e.key==='ArrowRight') step(1); else if(e.key==='ArrowLeft') step(-1);
    });
    document.addEventListener('contextmenu', function(e){ if(e.target.tagName==='IMG') e.preventDefault(); });
    document.addEventListener('dragstart', function(e){ if(e.target.tagName==='IMG') e.preventDefault(); });
  </script>
</body>
</html>
